[build]
  # When creating the Netlify site for the portal, set the site's
  # "Base directory" to `apps/portal` and Netlify will use this file.
  command = "pnpm --filter @ugur/portal build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.15.1"
  NEXT_USE_NETLIFY_EDGE = "true"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
